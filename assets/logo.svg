<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E"/>
      <stop offset="100%" style="stop-color:#161622"/>
    </linearGradient>
    <linearGradient id="wingGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="wingGradR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="50%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="60%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle glow behind core -->
  <circle cx="128" cy="120" r="56" fill="url(#glowGrad)"/>

  <!-- Left wing — 3 layered feathers -->
  <g filter="url(#softGlow)">
    <path d="M108 120 C88 95, 58 68, 28 48 C38 68, 52 88, 70 105 L108 120Z" fill="url(#wingGradL)" opacity="0.95"/>
    <path d="M104 128 C80 108, 52 88, 24 72 C36 88, 52 104, 72 116 L104 128Z" fill="url(#wingGradL)" opacity="0.75"/>
    <path d="M100 136 C78 120, 54 106, 32 94 C42 106, 56 118, 74 128 L100 136Z" fill="url(#wingGradL)" opacity="0.55"/>
  </g>

  <!-- Right wing — 3 layered feathers (mirrored) -->
  <g filter="url(#softGlow)">
    <path d="M148 120 C168 95, 198 68, 228 48 C218 68, 204 88, 186 105 L148 120Z" fill="url(#wingGradR)" opacity="0.95"/>
    <path d="M152 128 C176 108, 204 88, 232 72 C220 88, 204 104, 184 116 L152 128Z" fill="url(#wingGradR)" opacity="0.75"/>
    <path d="M156 136 C178 120, 202 106, 224 94 C214 106, 200 118, 182 128 L156 136Z" fill="url(#wingGradR)" opacity="0.55"/>
  </g>

  <!-- Core orb -->
  <circle cx="128" cy="120" r="36" fill="url(#coreGrad)"/>

  <!-- Inner ring highlight -->
  <circle cx="128" cy="120" r="36" fill="none" stroke="#A5B4FC" stroke-width="1" opacity="0.3"/>

  <!-- H lettermark -->
  <text x="128" y="137" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="700" font-size="44" fill="#F1F5F9" letter-spacing="-1">H</text>

  <!-- Messenger dots (caduceus reference) -->
  <circle cx="116" cy="172" r="3.5" fill="#818CF8" opacity="0.9"/>
  <circle cx="128" cy="172" r="4" fill="#818CF8"/>
  <circle cx="140" cy="172" r="3.5" fill="#818CF8" opacity="0.9"/>

  <!-- Connecting line between dots -->
  <line x1="116" y1="172" x2="140" y2="172" stroke="#818CF8" stroke-width="1" opacity="0.4"/>
</svg>