<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { display: flex; justify-content: center; background: #0e0e10; margin: 0; padding: 0; }
    .sidebar-view { width: 400px; height: 700px; overflow: hidden; }
/* Hermes Sidebar — Dark theme by default, light theme overrides */

:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-tertiary: #313244;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --accent: #89b4fa;
  --accent-hover: #74c7ec;
  --border: #45475a;
  --success: #a6e3a1;
  --warning: #f9e2af;
  --error: #f38ba8;
  --radius: 6px;
}

.theme-light {
  --bg-primary: #eff1f5;
  --bg-secondary: #e6e9ef;
  --bg-tertiary: #ccd0da;
  --text-primary: #4c4f69;
  --text-secondary: #5c5f77;
  --border: #bcc0cc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg-primary);
  height: 100vh;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Header */
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-icon {
  font-size: 18px;
}

.logo-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

/* Status badge */
.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--error);
}

.status-badge.connected .status-dot {
  background: var(--success);
}

.status-badge.connecting .status-dot {
  background: var(--warning);
  animation: pulse 1.5s infinite;
}

.status-badge.disconnected {
  color: var(--error);
}

.status-badge.connected {
  color: var(--success);
}

.status-badge.connecting {
  color: var(--warning);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Navigation */
.sidebar-nav {
  display: flex;
  padding: 8px;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 10px;
  transition: all 0.15s;
}

.nav-item:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-tertiary);
  color: var(--accent);
}

.nav-icon {
  font-size: 16px;
  line-height: 1;
}

.nav-label {
  font-weight: 500;
}

/* Content */
.sidebar-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.tab-content {
  display: none;
  height: 100%;
  overflow-y: auto;
}

.tab-content.active {
  display: flex;
  flex-direction: column;
}

/* Empty states */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  text-align: center;
  gap: 12px;
  color: var(--text-secondary);
}

.empty-icon {
  font-size: 40px;
  opacity: 0.5;
}

.empty-state h2 {
  font-size: 16px;
  color: var(--text-primary);
}

.empty-state p {
  font-size: 12px;
  line-height: 1.5;
  max-width: 260px;
}

/* Buttons */
.btn-primary {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: var(--bg-primary);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-primary:hover {
  background: var(--accent-hover);
}

/* Chat */
.hidden {
  display: none !important;
}

.chat-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  text-align: center;
  gap: 10px;
  color: var(--text-secondary);
}

.chat-welcome h2 {
  font-size: 15px;
  color: var(--text-primary);
}

.chat-welcome p {
  font-size: 12px;
  line-height: 1.5;
  max-width: 240px;
}

.chat-status-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  font-size: 11px;
  color: var(--warning);
}

.chat-status-bar.ready {
  color: var(--success);
}

.chat-status-bar.error {
  color: var(--error);
}

.chat-area {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chat-bubble {
  max-width: 95%;
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 12px;
  line-height: 1.5;
  word-break: break-word;
}

.chat-bubble-user {
  align-self: flex-end;
  background: var(--accent);
  color: var(--bg-primary);
  border-bottom-right-radius: 2px;
}

.chat-bubble-assistant {
  align-self: flex-start;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-bottom-left-radius: 2px;
}

.chat-bubble-assistant.streaming {
  border-left: 2px solid var(--accent);
}

.chat-bubble-error {
  align-self: center;
  background: var(--error);
  color: var(--bg-primary);
  font-size: 11px;
  max-width: 100%;
}

.chat-bubble-content {
  white-space: pre-wrap;
}

.chat-bubble-content .inline-code {
  background: rgba(0, 0, 0, 0.3);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 11px;
}

.chat-bubble-content .code-block {
  display: block;
  background: #0e0e10;
  padding: 8px;
  border-radius: 4px;
  margin: 6px 0;
  overflow-x: auto;
}

.chat-bubble-content .code-block pre {
  margin: 0;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 11px;
  line-height: 1.4;
  color: #d4d4d4;
}

.chat-bubble-time {
  font-size: 9px;
  color: var(--text-secondary);
  margin-top: 4px;
  opacity: 0.7;
}

.chat-bubble-user .chat-bubble-time {
  text-align: right;
}

/* Typing dots animation */
.typing-dots span {
  animation: blink 1.4s infinite both;
  font-size: 18px;
  line-height: 1;
}

.typing-dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* Chat input area */
.chat-input-area {
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}

.chat-form {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 12px;
}

.chat-textarea {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  resize: none;
  max-height: 120px;
  min-height: 36px;
  line-height: 1.4;
}

.chat-textarea:focus {
  border-color: var(--accent);
}

.chat-textarea::placeholder {
  color: var(--text-secondary);
}

.chat-textarea:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-send {
  padding: 8px 14px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: var(--bg-primary);
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-send:hover {
  background: var(--accent-hover);
}

.btn-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-cancel {
  padding: 8px 14px;
  border: none;
  border-radius: var(--radius);
  background: var(--error);
  color: var(--bg-primary);
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-cancel:hover {
  opacity: 0.8;
}

.chat-hint {
  padding: 0 12px 6px;
  font-size: 10px;
  color: var(--text-secondary);
  opacity: 0.6;
  text-align: center;
}

/* Settings */
.settings-panel {
  padding: 16px;
}

.settings-panel h2 {
  font-size: 14px;
  margin-bottom: 16px;
}

.setting-group {
  margin-bottom: 12px;
}

.setting-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.setting-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}

.setting-input:focus {
  border-color: var(--accent);
}

/* Footer */
.sidebar-footer {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  font-size: 11px;
  color: var(--text-secondary);
}

.sidebar-footer a {
  color: var(--accent);
  text-decoration: none;
}

.sidebar-footer a:hover {
  text-decoration: underline;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-secondary);
}

/* Terminal */
.terminal-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.terminal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.terminal-header h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.terminal-actions {
  display: flex;
  gap: 4px;
}

.btn-icon {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  border-radius: 4px;
  color: var(--text-secondary);
}

.btn-icon:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.terminal-commands {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.terminal-command-group h4 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.command-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.cmd-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
}

.cmd-btn:hover {
  border-color: var(--accent);
  background: var(--bg-tertiary);
}

.cmd-btn.running {
  border-color: var(--warning);
  opacity: 0.7;
  pointer-events: none;
}

.cmd-icon {
  font-size: 18px;
}

.cmd-label {
  font-weight: 500;
}

.terminal-output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  background: #0e0e10;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  min-height: 120px;
}

.command-block {
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.command-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
}

.command-title {
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
}

.command-status {
  font-size: 11px;
  color: var(--text-secondary);
}

.command-status.running {
  color: var(--warning);
}

.command-status.success {
  color: var(--success);
}

.command-status.error {
  color: var(--error);
}

.command-output {
  padding: 8px 10px;
  margin: 0;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.5;
  color: #d4d4d4;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}

.terminal-input-container {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}

.terminal-prompt {
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  color: var(--accent);
  font-weight: 700;
}

.terminal-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: #0e0e10;
  color: #d4d4d4;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  outline: none;
}

.terminal-input:focus {
  border-color: var(--accent);
}

.terminal-input::placeholder {
  color: var(--text-secondary);
  opacity: 0.5;
}

/* File Navigation */
.file-nav-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.file-nav-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}

.file-nav-header h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.file-nav-actions {
  display: flex;
  gap: 4px;
}

.file-search-container {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.file-search-input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
}

.file-search-input:focus {
  border-color: var(--accent);
}

.file-search-input::placeholder {
  color: var(--text-secondary);
}

/* Open files bar */
.open-files-bar {
  display: flex;
  gap: 2px;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  overflow-x: auto;
  min-height: 0;
}

.open-files-bar:empty {
  display: none;
}

.file-tab {
  padding: 4px 10px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}

.file-tab:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.file-tab.active {
  background: var(--bg-tertiary);
  color: var(--accent);
  font-weight: 500;
}

/* File list */
.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid transparent;
}

.file-item:hover {
  background: var(--bg-tertiary);
}

.file-icon {
  font-size: 14px;
  flex-shrink: 0;
  width: 20px;
  text-align: center;
}

.file-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  flex-shrink: 0;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-path {
  font-size: 11px;
  color: var(--text-secondary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.file-language {
  font-size: 10px;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 1px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  text-transform: uppercase;
}
