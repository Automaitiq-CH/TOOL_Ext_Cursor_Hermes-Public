<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { display: flex; justify-content: center; background: #0e0e10; margin: 0; padding: 0; }
    .sidebar-view { width: 400px; height: 700px; overflow: hidden; }
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-tertiary: #313244;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --accent: #89b4fa;
  --accent-hover: #74c7ec;
  --border: #45475a;
  --success: #a6e3a1;
  --warning: #f9e2af;
  --error: #f38ba8;
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: var(--text-primary); background: var(--bg-primary); overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100%; }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { font-size: 18px; }
.logo-text { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.status-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--error); }
.status-badge.connected .status-dot { background: var(--success); }
.status-badge.connected { color: var(--success); }
.sidebar-nav { display: flex; padding: 8px; gap: 4px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; border: none; border-radius: var(--radius); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 10px; transition: all 0.15s; }
.nav-item.active { background: var(--bg-tertiary); color: var(--accent); }
.nav-icon { font-size: 16px; line-height: 1; }
.nav-label { font-weight: 500; }
.sidebar-content { flex: 1; overflow: hidden; position: relative; }
.tab-content { display: none; height: 100%; overflow-y: auto; }
.tab-content.active { display: flex; flex-direction: column; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; text-align: center; gap: 12px; color: var(--text-secondary); }
.empty-icon { font-size: 40px; opacity: 0.5; }
.empty-state h2 { font-size: 16px; color: var(--text-primary); }
.empty-state p { font-size: 12px; line-height: 1.5; max-width: 260px; }
.chat-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; text-align: center; gap: 10px; color: var(--text-secondary); }
.chat-welcome h2 { font-size: 15px; color: var(--text-primary); }
.chat-welcome p { font-size: 12px; line-height: 1.5; max-width: 240px; }
.chat-status-bar { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); background: var(--bg-tertiary); font-size: 11px; color: var(--warning); }
.chat-status-bar.ready { color: var(--success); }
.sidebar-footer { display: flex; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--bg-secondary); font-size: 11px; color: var(--text-secondary); }
.sidebar-footer a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  <title>Hermes Agent - Chat Welcome</title>
</head>
<body>
  <div class="sidebar-view">
    <div id="app">
      <header class="sidebar-header">
        <div class="logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="20" height="20"><defs><linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#818CF8"/><stop offset="100%" style="stop-color:#6366F1"/></linearGradient><linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366F1"/><stop offset="100%" style="stop-color:#4F46E5"/></linearGradient></defs><circle cx="128" cy="128" r="124" fill="#1E1E2E"/><path d="M120 128 C90 90, 50 60, 30 45 C40 70, 55 95, 75 115 C60 100, 45 90, 35 85 C50 105, 70 120, 90 135 C80 125, 70 118, 62 114 C75 128, 95 142, 120 140 Z" fill="url(#wingGrad)" opacity="0.9"/><path d="M136 128 C166 90, 206 60, 226 45 C216 70, 201 95, 181 115 C196 100, 211 90, 221 85 C206 105, 186 120, 166 135 C176 125, 186 118, 194 114 C181 128, 161 142, 136 140 Z" fill="url(#wingGrad)" opacity="0.9"/><circle cx="128" cy="118" r="32" fill="url(#coreGrad)"/><text x="128" y="134" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="40" fill="#E2E8F0">H</text><circle cx="128" cy="168" r="4" fill="#818CF8"/><circle cx="116" cy="168" r="3" fill="#818CF8" opacity="0.6"/><circle cx="140" cy="168" r="3" fill="#818CF8" opacity="0.6"/></svg>
          <h1 class="logo-text">Hermes Agent</h1>
        </div>
        <div class="status-badge connected"><span class="status-dot"></span><span class="status-text">Connected</span></div>
      </header>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="chat"><span class="nav-icon">&#9993;</span><span class="nav-label">Chat</span></button>
        <button class="nav-item" data-tab="kanban"><span class="nav-icon">&#9776;</span><span class="nav-label">Kanban</span></button>
        <button class="nav-item" data-tab="terminal"><span class="nav-icon">&#9608;</span><span class="nav-label">Terminal</span></button>
        <button class="nav-item" data-tab="files"><span class="nav-icon">&#128193;</span><span class="nav-label">Files</span></button>
        <button class="nav-item" data-tab="sessions"><span class="nav-icon">&#8984;</span><span class="nav-label">Sessions</span></button>
        <button class="nav-item" data-tab="settings"><span class="nav-icon">&#9881;</span><span class="nav-label">Settings</span></button>
      </nav>
      <main class="sidebar-content">
        <section id="tab-chat" class="tab-content active">
          <div class="chat-welcome">
            <div class="empty-icon">&#9889;</div>
            <h2>Hermes Chat</h2>
            <p>Ask questions about your codebase. Hermes has context about your open files and project.</p>
            <div class="chat-status-bar ready">
              <span class="status-dot" style="background:var(--success)"></span>
              <span>Hermes ready</span>
            </div>
          </div>
        </section>
      </main>
      <footer class="sidebar-footer">
        <span>v0.1.0</span>
        <a href="#">Docs</a>
      </footer>
    </div>
  </div>
</body>
</html>
